name: reusable-map-build

on:
  workflow_call:
    inputs:
      countrycode:
        description: Country code passed to generate_map.py
        required: true
        type: string
      maps:
        description: "JSON array with objects: name, url, state"
        required: true
        type: string
      variants:
        description: "JSON array with objects: id, drop_names, include_water, include_green, tag_file"
        required: false
        type: string
        default: |
          [
            {"id":"no-street-names","drop_names":true,"include_water":false,"include_green":false,"tag_file":"tags_minimal_street_only.xml"},
            {"id":"with-streetnames","drop_names":false,"include_water":false,"include_green":false,"tag_file":"tags_minimal_street_only.xml"},
            {"id":"with-water","drop_names":false,"include_water":true,"include_green":false,"tag_file":"tags_with_water.xml"},
            {"id":"with-green-stuff","drop_names":false,"include_water":false,"include_green":true,"tag_file":"tags_with_green_stuff.xml"}
          ]
      continue_on_error:
        description: Keep matrix jobs running when one fails
        required: false
        default: true
        type: boolean

jobs:
  build-map-variants:
    runs-on: ubuntu-latest
    continue-on-error: ${{ inputs.continue_on_error }}
    strategy:
      matrix:
        map: ${{ fromJson(inputs.maps) }}
        variant: ${{ fromJson(inputs.variants) }}

    steps:
      - name: checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Env
        run: |
          sudo apt-get update
          sudo apt-get install -y wget openjdk-21-jre python3-pip
          pip3 install numpy
          echo "freeing ~10gb of disk space"
          sudo rm -rf /usr/local/lib/android || true

      - name: omsis-cache
        uses: actions/cache/restore@v4
        id: cache
        with:
          path: osmosis
          key: osmosis-cache

      - name: omsis
        if: steps.cache.outputs.cache-hit != 'true'
        run: sh setup_env.sh

      - name: Download
        run: |
          wget ${{ matrix.map.url }} -O tmp.pbf

      - name: Convert for filtering
        run: |
          ./osmosis/osmconvert tmp.pbf -o=tmp.o5m
          rm tmp.pbf

      - name: filter
        env:
          DROP_NAMES: ${{ matrix.variant.drop_names }}
          INCLUDE_WATER: ${{ matrix.variant.include_water }}
          INCLUDE_GREEN: ${{ matrix.variant.include_green }}
        run: |
          KEEP_CMD=(
            osmosis/osmfilter -v tmp.o5m
            '--keep=highway=primary =primary_link =secondary =secondary_link =tertiary =tertiary_link =trunk =trunk_link =cycleway =living_street =residential =road =track =unclassified'
            '--keep=highway=service and ( bicycle=designated or bicycle=yes or bicycle=permissive )'
            '--keep=highway=footway and ( bicycle=designated or bicycle=yes or bicycle=permissive )'
            '--keep=highway=bridleway and ( bicycle=designated or bicycle=yes or bicycle=permissive )'
            '--keep=highway=path and ( bicycle=designated or bicycle=yes or bicycle=permissive )'
            '--keep=highway=pedestrian and ( bicycle=designated or bicycle=yes or bicycle=permissive )'
            '--keep=highway=unclassified and ( bicycle=designated or bicycle=yes or bicycle=permissive )'
            '--keep=sidewalk:*:bicycle=yes'
            '--keep=route=bicycle =mtb'
            '--keep=cycleway:*=lane :*=track *:=shared_lane *:=share_busway *:=separate *:=crossing *:=shoulder *:=link *:=traffic_island'
            '--keep=bicycle_road=yes'
            '--keep=cyclestreet=yes'
          )

          if [[ "$INCLUDE_GREEN" == "true" ]]; then
            KEEP_CMD+=("--keep=waterway= landuse= natural= leisure=")
          elif [[ "$INCLUDE_WATER" == "true" ]]; then
            KEEP_CMD+=("--keep=waterway= landuse= natural=")
          fi

          if [[ "$DROP_NAMES" == "true" ]]; then
            KEEP_CMD+=("--drop-tags=name= ref=")
          fi

          "${KEEP_CMD[@]}" --out-o5m > tmp1.o5m

          MODIFY_TAGS=$(cat <<'EOT'
          highway=trunk_link to =primary \
          highway=trunk to =primary \
          highway=primary_link to =primary \
          highway=tertiary_link to =tertiary \
          highway=secondary_link to =secondary \
          highway=trunk_link to =trunk \
          highway=footway to =cycleway \
          highway=bridleway to =cycleway \
          highway=sidewalk to =cycleway \
          highway=path to =cycleway \
          highway=pedestrian to =cycleway \
          highway=unclassified to =cycleway
          EOT
          )

          if [[ "$INCLUDE_GREEN" == "true" ]]; then
            MODIFY_TAGS+=$' \\\nleisure=garden to landuse=grass \\\nleisure=playground to landuse=grass \\\nleisure=park to landuse=grass \\\nlanduse=orchard to =grass \\\nlanduse=allotments to =grass \\\nlanduse=farmland to =grass \\\nlanduse=flowerbed to =grass \\\nlanduse=meadow to =grass \\\nlanduse=plant_nursery to =grass \\\nlanduse=vineyard to =grass \\\nlanduse=greenfield to =grass \\\nlanduse=village_green to =grass \\\nlanduse=greenery to =grass \\\nlanduse=cemetery to =grass \\\nnatural=scrub to landuse=grass'
          fi

          osmosis/osmfilter -v tmp1.o5m --modify-tags="$MODIFY_TAGS" --drop-author --drop-version --out-o5m > tmp_filtered.o5m

          rm tmp.o5m tmp1.o5m

      - name: Convert for osmosis
        run: |
          ./osmosis/osmconvert tmp_filtered.o5m -o=tmp_filtered.pbf
          rm tmp_filtered.o5m

      - name: Build mapsforge map
        run: |
          /usr/bin/time -v python generate_map.py -i tmp_filtered.pbf -c ${{ inputs.countrycode }} -s ${{ matrix.map.state }} -t ${{ matrix.variant.tag_file }}

      - name: zip
        run: |
          zip -r ${{ github.workflow }}-${{ matrix.map.name }}-${{ matrix.variant.id }}.zip *.map

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.workflow }}-${{ matrix.map.name }}-${{ matrix.variant.id }}
          path: ./${{ github.workflow }}-${{ matrix.map.name }}-${{ matrix.variant.id }}.zip

      - name: get tag
        id: tag
        run: |
          git fetch --force --tags
          git tag
          echo "tag=$(git describe --tags --abbrev=0)" >> "$GITHUB_OUTPUT"

      - name: Release
        continue-on-error: true
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: ./*.zip
